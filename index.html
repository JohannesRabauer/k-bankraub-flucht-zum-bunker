<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bankraub: Flucht zum Bunker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1e;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden; flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas {
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 60px rgba(80,60,200,0.15);
      max-width: 100vw; max-height: 65vh; width: auto; height: auto;
      touch-action: none;
    }
    @media (max-width: 820px) {
      canvas { max-height: 50vh; border-radius: 4px; }
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="450"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
